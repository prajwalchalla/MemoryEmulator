;For simplicity, we have skipped L1 cache which simplifies the coherency protocol and speeds up the analysis

[Filter_function]
num_L2_caches=288 ; 4
filter_function=1 ;#0 is off 1 is on. Which considers L2 cache with specified size, assoc
capacity=1024 ;    L2 size in kB
assoc=8 ;
access_latency=2 ;   #L1+L2 acccess latency
dir=1 ; 0 means no directory/coherency. 1 coherency is on using directory. Add dir to the filter function to accurately measure misses and L3 accesses


[L3_cache]
capacity=36    ; in MBytes
assoc=4 ; associativity
linesize=64 ; in bytes
access_latency=6 ; read write access latency; Here the cache latency will be L1+L2+L3 latency if no filter function else only L3 cache
banks=4 ;   not used currently but still passed. Need to figure out the hashing....


;Not currently using memory configs with HOME v1. But some of the scripts analyzing L3 misses(DRAM accesses) use them
[Memory]    
access_latency=50 ;  latency in ns
numChannel=2    ;  Each channel comes through an L3 cache. Each having its own controller
numRanks=2 ; Number of ranks in the memory
numBankgroups=4 ; Ranks are made up of bankgroups
num_banks_per_group=4 ; banks have independent accesses. each bank as a row buffer.
numRows=65536 ; number of rows in DRAM. Typically each row buffer size is 8kB. 64 bits * 1024 columns
numColumns=1024 ; Typically it has been 10 bits address space in column which is 2^10=1024



